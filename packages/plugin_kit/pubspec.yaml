name: plugin_kit
description: >-
  A powerful plug'n'play plugin system for any Dart project. Lifecycle-aware
  plugins, scoped services, an event bus, sessions, and runtime configuration.
version: 0.1.0
homepage: https://plugin-kit-docs.saadodi44.workers.dev
repository: https://github.com/SaadArdati/plugin_kit
issue_tracker: https://github.com/SaadArdati/plugin_kit/issues
topics:
  - plugins
  - architecture
  - event-bus
  - dependency-injection
  - lifecycle

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  collection: ^1.19.1
  logging: ^1.3.0
  meta: ">=1.17.0 <2.0.0"

dev_dependencies:
  lints: ^6.1.0
  test: ">=1.25.0 <1.31.0"
