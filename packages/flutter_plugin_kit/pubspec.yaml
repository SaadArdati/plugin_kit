name: flutter_plugin_kit
description: Flutter ergonomics for plugin_kit — scope widgets, a State mixin, a ChangeNotifier adapter, and BuildContext.watchEvent / readEvent. Zero pubspec deps beyond flutter and plugin_kit.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_kit: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
