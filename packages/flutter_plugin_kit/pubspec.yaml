name: flutter_plugin_kit
description: >-
  Flutter ergonomics for plugin_kit: scope widgets, a State mixin, a
  ChangeNotifier adapter, and BuildContext.watchEvent / readEvent helpers.
version: 0.1.0
homepage: https://plugin-kit.saad-ardati.dev
repository: https://github.com/SaadArdati/plugin_kit
issue_tracker: https://github.com/SaadArdati/plugin_kit/issues
topics:
  - plugins
  - flutter
  - event-bus
  - state-management
  - lifecycle

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_kit: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
