name: flutter_plugin_kit_example
description: A small live demo of every reading path in flutter_plugin_kit — context.watchEvent, the SessionListener mixin, and PluginEventNotifier through a ValueListenableBuilder.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_kit:
    path: ../../plugin_kit
  flutter_plugin_kit:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
