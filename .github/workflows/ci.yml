name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve workspace
        run: flutter pub get

      - name: Analyze
        run: |
          flutter analyze packages/plugin_kit
          flutter analyze packages/plugin_kit_dialog
          flutter analyze packages/flutter_plugin_kit
          flutter analyze website/snippets
          flutter analyze example/state_garden
          flutter analyze example/code_editor
          flutter analyze example/plugin_kit_dialog_demo
          flutter analyze example/model_embassy

      - name: Test
        # Skips `goldens`-tagged tests: PNG rendering is environment-sensitive
        # (fonts, sub-pixel positioning) and the committed goldens exist for
        # the website's doc images. Regenerate locally after UI changes via
        # `flutter test --update-goldens test/golden_test.dart`.
        run: |
          flutter test packages/plugin_kit
          flutter test packages/plugin_kit_dialog
          flutter test packages/flutter_plugin_kit
          flutter test website/snippets
          flutter test example/state_garden
          flutter test example/plugin_kit_dialog_demo --exclude-tags=goldens

  doc-excerpts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install website deps
        # --frozen-lockfile enforces that website/pnpm-lock.yaml is honored.
        # If transitive deps drift, refresh locally with
        # `pnpm --filter ./website install` and commit the updated lockfile.
        run: pnpm --filter ./website install --frozen-lockfile

      - name: Check .md doc excerpts are in sync
        run: node scripts/update-md-excerpts.mjs --check

      - name: Check .md install versions match pubspec
        run: node scripts/sync-md-versions.mjs --check

      - name: Build website (verifies MDX excerpts compile)
        run: cd website && pnpm build
