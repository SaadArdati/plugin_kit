name: Deploy Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: deploy-site-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install website deps
        run: pnpm --filter ./website install --frozen-lockfile

      - name: Resolve Flutter workspace
        run: flutter pub get

      # Each Flutter example is built with --base-href matching its eventual sub-path so
      # asset URLs (main.dart.js, canvaskit, fonts) resolve at the right depth once the
      # build/web folder is dropped into website/dist/<sub>/.
      - name: Build code_editor
        working-directory: example/code_editor
        run: flutter build web --release --no-tree-shake-icons --base-href=/code-editor/

      - name: Build plugin_kit_dialog_demo
        working-directory: example/plugin_kit_dialog_demo
        run: flutter build web --release --base-href=/dialog/

      - name: Build state_garden
        working-directory: example/state_garden
        run: flutter build web --release --base-href=/state-garden/

      - name: Build website
        run: pnpm --filter ./website build

      - name: Combine into single dist
        run: |
          set -euo pipefail
          mkdir -p website/dist/code-editor website/dist/dialog website/dist/state-garden
          cp -R example/code_editor/build/web/. website/dist/code-editor/
          cp -R example/plugin_kit_dialog_demo/build/web/. website/dist/dialog/
          cp -R example/state_garden/build/web/. website/dist/state-garden/

      # Fork PRs can't access secrets - the build above still runs as a check.
      # Production deploys land on main; same-repo PRs get preview URLs at
      # <hash>.plugin-kit.pages.dev.
      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/dist
            --project-name=plugin-kit
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}
