name: docs_snippets
description: >
  One-off Dart snippets that the website's MDX pages and the package READMEs
  reference via `// #docregion <name>` markers. Lives under website/ because
  it serves only docs, not consumers. flutter test exercises every snippet
  under checked mode so assert() lines fire and prove the doc claim.
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  logging: ^1.3.0
  plugin_kit:
    path: ../../packages/plugin_kit
  plugin_kit_dialog:
    path: ../../packages/plugin_kit_dialog
  flutter_plugin_kit:
    path: ../../packages/flutter_plugin_kit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
