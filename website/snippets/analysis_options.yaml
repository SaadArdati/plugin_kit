include: package:flutter_lints/flutter.yaml

# Snippets are documentation. Readers copy them, so we want the strictest
# lints we use elsewhere in the workspace. Print is allowed because some
# snippets demonstrate behaviour by printing to stdout.
linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    avoid_print: false
